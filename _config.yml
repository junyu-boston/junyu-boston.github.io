# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

lang: en

# Change to your timezone
timezone: America/New_York

# jekyll-seo-tag settings
title: Jun Yu, PhD

tagline: Computational Biologist · Data Scientist · ML Systems

description: >-
  Technical writing on data engineering, cloud architecture, ML systems,
  and computational biology.

url: "https://junyu-boston.github.io"

github:
  username: junyu-boston

social:
  name: Jun Yu
  links:
    - https://github.com/junyu-boston

# No analytics for now
analytics:
  google:
    id:

theme_mode: # [light | dark]

avatar:

toc: true

# No comments for now
comments:
  provider:

paginate: 10

baseurl: ""

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
